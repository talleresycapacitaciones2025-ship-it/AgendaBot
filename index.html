<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaBot - Calendario Personal</title>
    <!-- FullCalendar CSS/JS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { margin: 0; background: #f0f2f5; padding: 1rem; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 1rem; }
        .chat-panel { background: white; border-radius: 24px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        .calendar-panel { background: white; border-radius: 24px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .messages { flex: 1; overflow-y: auto; margin-bottom: 1rem; border: 1px solid #eee; border-radius: 16px; padding: 0.5rem; background: #fafafa; }
        .message { margin: 0.5rem; padding: 0.5rem 1rem; border-radius: 20px; max-width: 85%; }
        .user { background: #d32f2f; color: white; align-self: flex-end; text-align: right; margin-left: auto; }
        .bot { background: #e5e7eb; color: #1f2937; }
        .input-area { display: flex; gap: 0.5rem; }
        input { flex: 1; padding: 0.75rem; border-radius: 40px; border: 1px solid #ccc; }
        button { background: #d32f2f; color: white; border: none; border-radius: 40px; padding: 0 1.25rem; cursor: pointer; }
        button:hover { background: #b71c1c; }
        h2, h3 { margin: 0 0 0.5rem 0; }
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .quick-btn { background: #e0e0e0; color: #333; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .quick-btn:hover { background: #ccc; }
        footer { text-align: center; margin-top: 1rem; font-size: 0.75rem; color: #666; grid-column: span 2; }
    </style>
</head>
<body>
<div class="container">
    <div class="chat-panel">
        <h2>🤖 AgendaBot</h2>
        <div class="quick-buttons">
            <div class="quick-btn" data-msg="Agenda una reunión con el equipo mañana a las 10am">📅 Ejemplo: reunión mañana</div>
            <div class="quick-btn" data-msg="¿Qué tengo hoy?">📌 ¿Qué tengo hoy?</div>
            <div class="quick-btn" data-msg="¿Qué tengo la próxima semana?">📆 Próxima semana</div>
            <div class="quick-btn" data-msg="Cancela mi reunión con el equipo">❌ Cancelar</div>
            <div class="quick-btn" data-msg="Cambia la reunión con el equipo a las 4pm">✏️ Editar hora</div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu mensaje... (ej: Agenda reunión con Ana el viernes a las 3pm)" autofocus>
            <button id="sendBtn">Enviar</button>
        </div>
    </div>
    <div class="calendar-panel">
        <h3>📅 Calendario</h3>
        <div id="calendar"></div>
    </div>
    <footer>⚡ Los eventos se guardan en la nube. Puedes cancelar, editar y ver tu mes completo.</footer>
</div>

<script>
    const WORKER_URL = "https://agenda-bot.dianaml76.workers.dev/chat";
    const EVENTOS_URL = "https://agenda-bot.dianaml76.workers.dev/eventos";

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerText = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage(text = null) {
        const message = text || userInput.value.trim();
        if (!message) return;
        if (!text) userInput.value = '';
        addMessage(message, 'user');
        showTyping();
        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: message })
            });
            const data = await res.json();
            hideTyping();
            addMessage(data.respuesta_texto || "❌ Error", 'bot');
            cargarEventosCalendario(); // refrescar calendario
        } catch(e) {
            hideTyping();
            addMessage("❌ Error de conexión", 'bot');
        }
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.innerText = '✍️ Escribiendo...';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function hideTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = null;
    }

    // Calendario FullCalendar
    let calendar;
    async function cargarEventosCalendario() {
        const res = await fetch(EVENTOS_URL);
        const eventos = await res.json();
        const events = eventos.map(ev => ({
            title: ev.titulo,
            start: `${ev.fecha}T${ev.hora}:00`,
            end: `${ev.fecha}T${ev.hora}:00`,
            extendedProps: { id: ev.id }
        }));
        if (calendar) {
            calendar.removeAllEvents();
            calendar.addEventSource(events);
        } else {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: events,
                eventClick: function(info) {
                    const titulo = info.event.title;
                    const fecha = info.event.start.toISOString().slice(0,10);
                    const hora = info.event.start.toISOString().slice(11,16);
                    if (confirm(`¿Cancelar evento "${titulo}" del ${fecha} a las ${hora}?`)) {
                        sendMessage(`Cancela ${titulo} del ${fecha}`);
                    }
                }
            });
            calendar.render();
        }
    }

    // Eventos UI
    sendBtn.addEventListener('click', () => sendMessage());
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => sendMessage(btn.getAttribute('data-msg')));
    });

    addMessage("👋 ¡Hola! Puedes agendar, cancelar, editar y ver tu calendario. Prueba los botones rápidos.", 'bot');
    cargarEventosCalendario();
</script>
</body>
</html>
