<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AgendaBot · Calendario Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/es.global.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        body {
            margin: 0;
            background: #f0f4fa;
            padding: 12px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .chat-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 65vh;
        }
        .calendar-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 1rem;
            display: none;
            flex-direction: column;
            min-height: 60vh;
        }
        .calendar-panel.visible {
            display: flex;
        }
        h2, h3 {
            margin: 0 0 0.5rem 0;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3a8a, #6d28d9);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .quick-btn {
            background: #eef2ff;
            color: #1e40af;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #cbd5e1;
        }
        .quick-btn:hover {
            background: #dbeafe;
            transform: translateY(-1px);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 0.75rem;
            padding: 0.5rem;
            background: #fefefe;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 55vh;
        }
        .message {
            max-width: 85%;
            padding: 0.6rem 1rem;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message strong {
            font-weight: 700;
        }
        .user {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .bot {
            background: #e9eef5;
            color: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .input-area {
            display: flex;
            gap: 0.7rem;
            margin-top: 0.5rem;
        }
        input {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 48px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 48px;
            padding: 0 1.5rem;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover {
            opacity: 0.92;
        }
        footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #4b5563;
        }

        /* === ESTILOS DEL CALENDARIO (mejor contraste) === */
        .fc {
            font-size: 0.85rem;
        }
        .fc .fc-button-primary {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        /* Fondo del evento y color de texto */
        .fc-daygrid-event {
            background: #6d28d9;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            padding: 2px 4px;
        }
        /* Texto del evento en negrita y blanco */
        .fc-daygrid-event .fc-event-title,
        .fc-daygrid-event .fc-event-time {
            color: white !important;
            font-weight: bold !important;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        /* Para vista de semana/mes, asegurar legibilidad */
        .fc-v-event .fc-event-title {
            color: white !important;
            font-weight: bold !important;
        }
        .fc-day-today {
            background-color: #eef2ff !important;
        }
        @media (max-width: 480px) {
            .chat-panel { min-height: 60vh; }
            .messages { max-height: 45vh; }
            .quick-btn { font-size: 0.7rem; padding: 0.3rem 0.8rem; }
            button { padding: 0 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="chat-panel">
        <h2>🤖 AgendaBot</h2>
        <div class="quick-buttons">
            <div class="quick-btn" data-msg="¿Qué tengo hoy?">📌 Hoy</div>
            <div class="quick-btn" data-msg="¿Qué tengo esta semana?">📆 Esta semana</div>
            <div class="quick-btn" id="toggleCalendarBtn">🗓️ Mostrar calendario</div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ej: Agenda firma el viernes a las 3pm" autofocus>
            <button id="sendBtn">Enviar</button>
        </div>
    </div>
    <div class="calendar-panel" id="calendarPanel">
        <h3>📅 Calendario</h3>
        <div id="calendar"></div>
        <p style="font-size:0.7rem; margin-top:0.8rem;">🔍 Haz clic en un evento para cancelarlo</p>
    </div>
</div>
<footer>⚡ Los eventos se guardan en la nube. Pregunta: "¿Qué tengo hoy?", "¿Qué tengo esta semana?"</footer>

<script>
    const WORKER_URL = "https://agenda-bot.dianaml76.workers.dev/chat";
    const EVENTOS_URL = "https://agenda-bot.dianaml76.workers.dev/eventos";

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const toggleCalendarBtn = document.getElementById('toggleCalendarBtn');
    const calendarPanel = document.getElementById('calendarPanel');
    let calendar = null;

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        if (type === 'bot') {
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/^[•\-]\s+/gm, '🔹 ');
            formatted = formatted.replace(/•/g, '🔹');
            formatted = formatted.replace(/\n/g, '<br>');
            msgDiv.innerHTML = formatted;
        } else {
            msgDiv.innerText = text;
        }
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.innerText = '✍️ Escribiendo...';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function hideTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = null;
    }

    async function sendMessage(text = null) {
        const message = text || userInput.value.trim();
        if (!message) return;
        if (!text) userInput.value = '';
        addMessage(message, 'user');
        showTyping();
        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: message })
            });
            const data = await res.json();
            hideTyping();
            addMessage(data.respuesta_texto || "❌ Respuesta vacía", 'bot');
            if (calendarPanel.classList.contains('visible')) await cargarEventosCalendario();
        } catch (err) {
            hideTyping();
            console.error(err);
            addMessage("❌ Error de conexión con el Worker", 'bot');
        }
    }

    function formatearHoraCompleta(hora) {
        if (!hora) return "";
        const partes = hora.split(':');
        if (partes.length !== 2) return hora;
        const h = partes[0];
        let m = partes[1];
        if (m.length === 1) m = '0' + m;
        return `${h}:${m}`;
    }

    async function cargarEventosCalendario() {
        try {
            const resp = await fetch(EVENTOS_URL);
            const eventos = await resp.json();
            const eventosFormateados = eventos.map(ev => {
                const [year, month, day] = ev.fecha.split('-').map(Number);
                let [hour, minute] = ev.hora.split(':').map(Number);
                if (isNaN(minute)) minute = 0;
                const fechaLocal = new Date(year, month-1, day, hour, minute);
                if (isNaN(fechaLocal.getTime())) return null;
                const horaCompleta = formatearHoraCompleta(ev.hora);
                const tituloConHora = `${ev.titulo} ${horaCompleta}`;
                return { id: ev.id, title: tituloConHora, start: fechaLocal, extendedProps: { id: ev.id } };
            }).filter(ev => ev !== null);

            if (calendar) {
                calendar.removeAllEvents();
                calendar.addEventSource(eventosFormateados);
            } else {
                const calendarEl = document.getElementById('calendar');
                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'es',
                    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                    buttonText: { today: 'Hoy', month: 'Mes', week: 'Semana', day: 'Día' },
                    eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
                    events: eventosFormateados,
                    eventClick: function(info) {
                        const idEvento = info.event.id;
                        const titulo = info.event.title;
                        const fechaStr = info.event.start.toISOString().slice(0,10);
                        if (confirm(`¿Cancelar evento "${titulo}" del ${fechaStr}?`)) {
                            sendMessage(`Cancela id:${idEvento}`);
                        }
                    }
                });
                calendar.render();
            }
        } catch (err) {
            console.error("Error cargando calendario", err);
        }
    }

    toggleCalendarBtn.addEventListener('click', async () => {
        const isVisible = calendarPanel.classList.contains('visible');
        if (!isVisible) {
            calendarPanel.classList.add('visible');
            toggleCalendarBtn.textContent = '🗓️ Ocultar calendario';
            await cargarEventosCalendario();
        } else {
            calendarPanel.classList.remove('visible');
            toggleCalendarBtn.textContent = '🗓️ Mostrar calendario';
        }
    });

    sendBtn.addEventListener('click', () => sendMessage());
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.querySelectorAll('.quick-btn').forEach(btn => {
        if (btn.id !== 'toggleCalendarBtn') {
            btn.addEventListener('click', () => {
                const msg = btn.getAttribute('data-msg');
                if (msg) sendMessage(msg);
            });
        }
    });

    addMessage("👋 ¡Hola! Prueba: 'Agenda firma el viernes a las 3pm', '¿Qué tengo hoy?' o '¿Qué tengo esta semana?'", 'bot');
</script>
</body>
</html>
